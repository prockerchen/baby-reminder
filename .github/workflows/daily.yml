name: Daily Baby Reminder (manual only)

# Schedule DISABLED - now using CodeBuddy local automation as primary trigger.
# This workflow is kept for manual dispatch only (emergency/testing).

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  # schedule: DISABLED (unreliable for private repos on free tier)
  workflow_dispatch:
    inputs:
      force:
        description: '忽略时间检查，直接推送（用于手动测试）'
        required: false
        default: 'true'

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Send daily message
        env:
          BABY_PROFILE_KEY: ${{ secrets.BABY_PROFILE_KEY }}
          FORCE: ${{ github.event.inputs.force }}
        run: python main.py
