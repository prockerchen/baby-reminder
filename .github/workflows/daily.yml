name: Daily Baby Reminder

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # 每 30 分钟跑一次（GitHub 高峰期可能跳过 cron 的整点，缩短间隔以提高命中率）
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      force:
        description: '忽略时间检查，直接推送（用于手动测试）'
        required: false
        default: 'false'

jobs:
  send:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 允许 last_sent.txt 提交回仓库
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Send daily message
        env:
          BABY_PROFILE_KEY: ${{ secrets.BABY_PROFILE_KEY }}
          WECOM_WEBHOOK_KEY: ${{ secrets.WECOM_WEBHOOK_KEY }}
          FORCE: ${{ github.event.inputs.force }}
        run: |
          # 在 main.py 内部根据 FORCE 决定是否走时间网关
          python main.py
